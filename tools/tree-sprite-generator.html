
<canvas id="c" style="width:100%;height:300px;border-radius:8px;display:block;"></canvas>
<div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;align-items:center;">
  <div style="display:flex;align-items:center;gap:8px;"><label style="font-size:13px;color:var(--color-text-secondary);">Trunk width</label><input type="range" min="6" max="30" value="14" id="trunkwidth" step="1" style="width:80px;"><span id="trunkwidth-out" style="font-size:13px;font-weight:500;min-width:16px;">14</span></div>
  <div style="display:flex;align-items:center;gap:8px;"><label style="font-size:13px;color:var(--color-text-secondary);">Taper</label><input type="range" min="20" max="70" value="45" id="taper" step="1" style="width:80px;"><span id="taper-out" style="font-size:13px;font-weight:500;min-width:16px;">45%</span></div>
  <div style="display:flex;align-items:center;gap:8px;"><label style="font-size:13px;color:var(--color-text-secondary);">Branches</label><input type="range" min="2" max="5" value="3" id="branches" step="1" style="width:80px;"><span id="branches-out" style="font-size:13px;font-weight:500;min-width:16px;">3</span></div>
  <div style="display:flex;align-items:center;gap:8px;"><label style="font-size:13px;color:var(--color-text-secondary);">Depth</label><input type="range" min="2" max="5" value="4" id="depth" step="1" style="width:80px;"><span id="depth-out" style="font-size:13px;font-weight:500;min-width:16px;">4</span></div>
  <div style="display:flex;align-items:center;gap:8px;"><label style="font-size:13px;color:var(--color-text-secondary);">Spread</label><input type="range" min="10" max="50" value="28" id="spread" step="1" style="width:80px;"><span id="spread-out" style="font-size:13px;font-weight:500;min-width:16px;">28</span></div>
  <div style="display:flex;align-items:center;gap:8px;"><label style="font-size:13px;color:var(--color-text-secondary);">Leaf size</label><input type="range" min="6" max="22" value="13" id="leafsize" step="1" style="width:80px;"><span id="leafsize-out" style="font-size:13px;font-weight:500;min-width:16px;">13</span></div>
  <button id="regen" style="font-size:13px;padding:6px 14px;">New tree</button>
</div>
<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var lx = -0.7071, ly = -0.7071;

function desat(hex, a) {
  var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  var gr=r*0.299+g*0.587+b*0.114;
  return '#'+[Math.round(r+(gr-r)*a),Math.round(g+(gr-g)*a),Math.round(b+(gr-b)*a)].map(function(v){return v.toString(16).padStart(2,'0')}).join('');
}

var rawRamp=['#2d3315','#374316','#3b401f','#495026','#4a581b','#565d2e'];
var leafRamp=rawRamp.map(function(c){return desat(c,0.18)});

function colFor(dx,dy){
  var len=Math.sqrt(dx*dx+dy*dy)||1;
  var dot=(dx/len)*lx+(dy/len)*ly;
  var t=(dot+1)/2;
  return leafRamp[Math.round(t*(leafRamp.length-1))];
}

function rf(a,b){return a+Math.random()*(b-a);}
var leaves=[];

function seg(x1,y1,x2,y2,w1,w2){
  var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
  var nx=dy/len,ny=-dx/len;
  ctx.beginPath();
  ctx.moveTo(x1+nx*w1,y1+ny*w1);ctx.lineTo(x2+nx*w2,y2+ny*w2);
  ctx.lineTo(x2-nx*w2,y2-ny*w2);ctx.lineTo(x1-nx*w1,y1-ny*w1);
  ctx.closePath();ctx.fillStyle='#4c3a23';ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
  ctx.lineTo(x2-nx*w2,y2-ny*w2);ctx.lineTo(x1-nx*w1,y1-ny*w1);
  ctx.closePath();ctx.fillStyle='#20230e';ctx.globalAlpha=0.72;ctx.fill();ctx.globalAlpha=1;
  ctx.beginPath();
  ctx.moveTo(x1+nx*w1,y1+ny*w1);ctx.lineTo(x2+nx*w2,y2+ny*w2);
  ctx.lineTo(x2+nx*w2*0.45,y2+ny*w2*0.45);ctx.lineTo(x1+nx*w1*0.45,y1+ny*w1*0.45);
  ctx.closePath();ctx.fillStyle='#6b5234';ctx.globalAlpha=0.45;ctx.fill();ctx.globalAlpha=1;
}

function branch(x,y,angle,len,wb,taper,depth,maxD,nb,spread){
  var ex=x+Math.cos(angle)*len,ey=y+Math.sin(angle)*len,wt=wb*taper;
  seg(x,y,ex,ey,wb/2,wt/2);
  if(depth===maxD){leaves.push({x:ex,y:ey});return;}
  var sr=spread*Math.PI/180;
  for(var i=0;i<nb;i++) branch(ex,ey,angle+rf(-sr,sr),len*rf(0.65,0.82),wt,taper,depth+1,maxD,nb,spread);
}

function fluffyCluster(cx,cy,size){
  // draw ~14 small circles: some tight to centre, some pushed out to edge to create lumpy silhouette
  var n=14;
  for(var i=0;i<n;i++){
    var angle=rf(0,Math.PI*2);
    // mix of inner and outer circles — outer ones create the bumpy edge
    var dist = i < 6 ? rf(0, size*0.4) : rf(size*0.35, size*0.75);
    var r    = i < 6 ? rf(size*0.35, size*0.6) : rf(size*0.2, size*0.38);
    var dx=Math.cos(angle)*dist, dy=Math.sin(angle)*dist;
    ctx.beginPath();
    ctx.arc(cx+dx, cy+dy, r, 0, Math.PI*2);
    ctx.fillStyle=colFor(dx,dy);
    ctx.globalAlpha=rf(0.82,0.97);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

function draw(){
  var W=canvas.width,H=canvas.height;
  var tw=parseInt(document.getElementById('trunkwidth').value);
  var tp=parseInt(document.getElementById('taper').value)/100;
  var nb=parseInt(document.getElementById('branches').value);
  var md=parseInt(document.getElementById('depth').value);
  var sp=parseInt(document.getElementById('spread').value);
  var ls=parseInt(document.getElementById('leafsize').value);
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1a1f0e';ctx.fillRect(0,0,W,H);
  var pos=[0.15,0.32,0.5,0.68,0.85];
  for(var t=0;t<5;t++){
    leaves=[];
    var bx=W*pos[t]+rf(-10,10),by=H-20+rf(-5,5);
    ctx.beginPath();ctx.ellipse(bx+tw*0.3,by+4,tw*0.8,3.5,0,0,Math.PI*2);
    ctx.fillStyle='#20230e';ctx.globalAlpha=0.65;ctx.fill();ctx.globalAlpha=1;
    branch(bx,by,-Math.PI/2+rf(-0.08,0.08),rf(48,72),tw,tp,1,md,nb,sp);
    leaves.sort(function(a,b){return a.y-b.y;});
    for(var i=0;i<leaves.length;i++) fluffyCluster(leaves[i].x,leaves[i].y,ls+rf(-2,3));
  }
}

function init(){
  canvas.width=canvas.offsetWidth||600;
  canvas.height=300;
  draw();
}

['trunkwidth','taper','branches','depth','spread','leafsize'].forEach(function(id){
  document.getElementById(id).addEventListener('input',function(){
    document.getElementById(id+'-out').textContent=id==='taper'?this.value+'%':this.value;
    draw();
  });
});
document.getElementById('regen').addEventListener('click',draw);
window.addEventListener('load',init);
setTimeout(init,200);
</script>
